# --- Configuration ----------------------------------------------------------

_jinja_extensions:
  - "copier_templates_extensions.TemplateExtensionLoader"
  - "extensions/strict_undefined.py:SetStrictUndefined"

_subdirectory: "template"

# --- Example Setup ----------------------------------------------------------

example_to_render:
  type: str
  help: >-
    The subdirectory name of the example to render in the `example-answers/`.

    If this is not set, the template will not render any example files.
  default: ""

example_answers_dir:
  type: str
  default: "example-answers/{{ example_to_render }}"
  when: False

# --- Questions --------------------------------------------------------------

module_type:
  type: str
  help: "The type of the existing module for this ETL process."
  default: "datasets"
  choices:
    - datasets
    - features
    - models

module_name:
  type: str
  help: "The name of the existing module for this ETL process."
  validator: >-
    {% if not (module_name | regex_search('^[a-zA-Z_][a-zA-Z0-9_]*$')) %}
      The module name must start with a letter or underscore and can only contain letters, numbers, and underscores.
    {% endif %}

etl_name:
  type: str
  help: "The name of the ETL process. Must be a valid Python identifier."
  validator: >-
    {% if not (module_name | regex_search('^[a-zA-Z_][a-zA-Z0-9_]*$')) %}
      The ETL name must start with a letter or underscore and can only contain letters, numbers, and underscores.
    {% endif %}

etl_name_long:
  type: str
  help: "A human readable name for the ETL process, used in documentation."
  default: "{{ etl_name | replace('_', ' ') | title }}"

etl_description:
  type: str
  help: "A short description of the ETL process."

requires_extract_external:
  type: bool
  help: >-
    Does this ETL process require extracting data from an external source
    other than data produced by a previous ETL process generated by
    an `able-workflow-copier` template?

    In that case `{{ package_name }}/{{ module_type }}/{{ etl_name }}/runner/extract_external.py`
    will be generated to handle the extraction of data from the external source.

format_code:
  type: bool
  help: >-
    Whether to format the generated code after generation.
    You must have `black`, `ruff`, and `snakefmt` installed
    in your conda environment for this to work.
    If you do not run this, you will need to run
    `black`, `ruff`, and `snakefmt` manually
    after running `copier` in order for lint tests to pass.
  default: true

# --- Calculated Variables ---------------------------------------------------

parent_project_tpl_answers_file:
  type: str
  help: "The path to the parent package template file."
  default: ".copier-answers/project.yml"
  when: False

parent_module_tpl_answers_file:
  type: str
  help: "The path to the parent module template file."
  default: ".copier-answers/module-{{ module_type }}-{{ module_name }}.yml"
  when: False

smk_file_name:
  type: str
  help: "The name of the smk file where the rule will be implemented."
  default: "{{ module_type }}/{{ module_name }}/{{ etl_name }}.smk"
  when: False

_answers_file: >-
  ./copier-answers/etl-{{ module_type }}-{{ module_name }}-{{ etl_name }}.yml

# --- External Data ----------------------------------------------------------

_external_data:
  parent_project_tpl: "{{ parent_project_tpl_answers_file }}"
  parent_module_tpl: "{{ parent_module_tpl_answers_file }}"
  example_answers: "{% if example_to_render %}{{ example_answers_file }}{% endif %}"

package_name:
  type: str
  help: >-
    The name of the project.

    DO NOT CHANGE THIS VALUE FROM THE DEFAULT
    IT SHOULD STAY IN SYNC WITH THE PARENT PROJECT TEMPLATE.
  default: "{{ _external_data.parent_project_tpl.package_name }}"

  # --- Post-configuration -----------------------------------------------------

_skip_if_exists:
  - "workflow/rules/includes.smk"
  - "workflow/profiles/default/config.yaml"

# Post-generation hooks
_tasks:
  # Add the rule to the workflow includes file
  - command: [
      "{{ _copier_python }}",
      "{{ _copier_conf.src_path }}/tasks/append_smk_include.py",
      "{{ smk_file_name }}"
    ]
  # Add the config to the workflow profile
  - command: [
      "{{ _copier_python }}",
      "{{ _copier_conf.src_path }}/tasks/append_config_include.py",
      "config/{{ module_type }}/{{ module_name }}/{{ etl_name }}/config.yaml"
    ]
  # Overwrite with full example files
  - command: [
      "{{ _copier_python }}",
      "{{ _copier_conf.src_path }}/tasks/copy_example.py",
      "--example-subdir",
      "{{ example_answers_dir }}/completed",
    ]
    when: "{{ example_to_render }}"

  # Run black, ruff, and snakefmt to format the code to fix line wraps
  # depending on length of generated code.
  - command: >-
      black ./
    when: "{{ format_code }}"
  - command: >-
      ruff check --fix ./
    when: "{{ format_code }}"
  - command: >-
      snakefmt --config snakefmt.toml workflow/
    when: "{{ format_code }}"

_message_after_copy: |
  The {{ module_type }}/{{ module_name }}/{{ etl_name }} ETL process
  has been created successfully.

  See `logs/post-copier-todos/etl-{{ module_type }}-{{ module_name }}-{{ etl_name }}.md`
  for next steps on implementing your rule into the project.
  You can copy-paste the contents of that file into a GitHub issue
  or a project management tool to track the implementation of the rule.
